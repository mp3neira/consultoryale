<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>detalhes — Consultor Yale</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/or (2) (1).png">
<style>
:root {
  --gold: #c8a96e;
  --gold-light: #e2c99a;
  --radius: 14px;
  --transition: 0.3s ease;
}
[data-theme="dark"] {
  --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
  --border: rgba(200,169,110,0.15); --text: #f0ece4; --muted: #6b6560;
  --nav-bg: rgba(13,13,13,0.92); --grid-line: rgba(200,169,110,0.025);
}
[data-theme="light"] {
  --bg: #f5f2ee; --surface: #ffffff; --surface2: #ede9e3;
  --border: rgba(150,110,60,0.18); --text: #1a1612; --muted: #8a7e72;
  --nav-bg: rgba(245,242,238,0.92); --grid-line: rgba(150,110,60,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}

/* Nav */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--nav-bg); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px; height: 64px;
  display: flex; align-items: center; gap: 16px;
  transition: background var(--transition);
}
.nav-back {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  cursor: pointer; text-decoration: none; color: var(--text); flex-shrink: 0;
  transition: border-color 0.2s, background 0.2s;
}
.nav-back:hover { border-color: var(--gold); background: rgba(200,169,110,0.08); }
.nav-brand {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700;
  color: var(--gold); letter-spacing: 0.04em; text-decoration: none; flex: 1;
}
.nav-brand span { color: var(--text); font-weight: 400; }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: border-color 0.2s, color 0.2s, background var(--transition);
}
.theme-toggle:hover { border-color: var(--gold); color: var(--gold); }
.theme-toggle .icon-moon { display: block; }
.theme-toggle .icon-sun  { display: none; }
[data-theme="light"] .theme-toggle .icon-moon { display: none; }
[data-theme="light"] .theme-toggle .icon-sun  { display: block; }

/* Layout */
.page {
  max-width: 1000px; margin: 0 auto;
  padding: 56px 40px 80px;
  display: grid; grid-template-columns: 1fr 360px;
  gap: 40px; align-items: start;
  position: relative; z-index: 1;
}

/* Gallery */
.gallery { position: sticky; top: 80px; }

.main-img-wrap {
  position: relative; border-radius: var(--radius); overflow: hidden;
  background: var(--surface2);
}
.main-img {
  width: 100%; height: 380px; object-fit: cover; display: block;
  transition: opacity 0.3s ease;
}
.no-img {
  width: 100%; height: 380px; background: var(--surface2); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);
}

/* Gallery arrows */
.gallery-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(13,13,13,0.7); border: 1px solid rgba(200,169,110,0.3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; z-index: 5;
  transition: background 0.2s, border-color 0.2s;
  backdrop-filter: blur(8px);
}
.gallery-arrow:hover { background: rgba(200,169,110,0.3); border-color: var(--gold); }
.gallery-arrow.prev { left: 12px; }
.gallery-arrow.next { right: 12px; }
.gallery-arrow.hidden { display: none; }

/* Photo count indicator */
.photo-count {
  position: absolute; bottom: 12px; right: 12px;
  background: rgba(0,0,0,0.6); color: #fff;
  font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 99px;
  backdrop-filter: blur(8px); z-index: 5;
}

/* Thumbnails */
.thumbnails {
  display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
}
.thumb {
  width: 64px; height: 48px; border-radius: 8px; object-fit: cover;
  border: 2px solid transparent; cursor: pointer; transition: border-color 0.2s, opacity 0.2s;
  opacity: 0.6;
}
.thumb:hover { opacity: 1; }
.thumb.active { border-color: var(--gold); opacity: 1; }

.badge-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.badge {
  padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border);
  font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase;
}

/* Right column */
.info { display: flex; flex-direction: column; gap: 0; }
.eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; opacity: 0.8; }
.title { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px, 4vw, 48px); font-weight: 700; line-height: 1; letter-spacing: -0.02em; margin-bottom: 6px; }
.subtitle { font-size: 15px; color: var(--muted); font-weight: 300; margin-bottom: 28px; }

.price-block {
  padding: 24px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); position: relative; overflow: hidden; margin-bottom: 24px;
  transition: background var(--transition);
}
.price-block::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.price-label { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.price { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 700; color: var(--gold); letter-spacing: -0.02em; line-height: 1; }

.specs {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 24px;
}
.spec { background: var(--surface); padding: 16px; display: flex; flex-direction: column; gap: 4px; transition: background var(--transition); }
.spec-label { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
.spec-value { font-size: 15px; font-weight: 500; color: var(--text); }

.desc-text {
  font-size: 14px; color: var(--muted); line-height: 1.7; font-weight: 300; margin-bottom: 28px;
  padding: 20px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  transition: background var(--transition);
}

.btn-wa {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px 24px; background: #25D366; color: #fff; border: none;
  border-radius: var(--radius); font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; text-decoration: none;
  transition: background 0.2s, transform 0.15s; margin-bottom: 12px;
}
.btn-wa:hover { background: #1fba59; transform: translateY(-1px); }

.btn-back {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px 24px; background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
}
.btn-back:hover { border-color: var(--gold); color: var(--gold); }

.error-page {
  min-height: 80vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; padding: 40px;
  position: relative; z-index: 1;
}
.error-page h2 { font-family: 'Cormorant Garamond', serif; font-size: 40px; margin-bottom: 12px; color: var(--muted); }

@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .page { grid-template-columns: 1fr; padding: 32px 16px 60px; }
  .gallery { position: static; }
  .main-img { height: 260px; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="/" onclick="voltarNav(event)" title="Voltar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </a>
  <a class="nav-brand" href="/">Consultor <span>Yale</span></a>
  <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
    <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  
</nav>

<div id="root"></div>

<script>
// ── Tema ─────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const novo = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', novo);
  localStorage.setItem('theme', novo);
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
})();

// ── Voltar ────────────────────────────────────────────
function voltarNav(e) {
  e.preventDefault();
  if (window.history.length > 1) { window.history.back(); }
  else { window.location.href = '/'; }
}

// ── Galeria ───────────────────────────────────────────
// IMPORTANTE: usar sempre window.galeriaFotos e window.galeriaIdx
// para que detalhes.js (carregado depois) acesse as mesmas variáveis.
window.galeriaFotos = [];
window.galeriaIdx   = 0;

function setFotoAtiva(idx) {
  window.galeriaIdx = idx;
  const fotos = window.galeriaFotos;
  const img   = document.getElementById('mainImg');
  const count = document.getElementById('photoCount');
  const prev  = document.getElementById('galleryPrev');
  const next  = document.getElementById('galleryNext');
  if (img && fotos[idx]) img.src = fotos[idx];
  if (count) count.textContent = `${idx + 1} / ${fotos.length}`;
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
  if (prev) prev.classList.toggle('hidden', idx === 0);
  if (next) next.classList.toggle('hidden', idx === fotos.length - 1);
}

function galeriaPrev() {
  if (window.galeriaIdx > 0) setFotoAtiva(window.galeriaIdx - 1);
}
function galeriaNext() {
  if (window.galeriaIdx < window.galeriaFotos.length - 1) setFotoAtiva(window.galeriaIdx + 1);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  galeriaPrev();
  if (e.key === 'ArrowRight') galeriaNext();
});
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase.js"></script>
<script src="/detalhes.js"></script>
</body>
</html>
